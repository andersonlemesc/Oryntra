changelog:
  exclude:
    labels:
      - skip-changelog
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🔐 Security
      labels:
        - security
    - title: 🔧 CI/CD & Infra
      labels:
        - ci
        - infra
        - deploy
    - title: ⚡ Performance
      labels:
        - performance
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: ⬆️ Dependencies
      labels:
        - dependencies
    - title: 🧹 Other Changes
      labels:
        - "*"
