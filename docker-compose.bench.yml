# Benchmark overlay — measures real throughput of the async runtime.
#
#   docker compose -f docker-compose.yml -f docker-compose.bench.yml up -d agent-python laravel-horizon
#
# Python: 4 uvicorn workers x 16 concurrency = 64 execution slots (no --reload).
# Horizon: agent ceiling 20, per-account fairness OFF (measure raw Python ceiling).
# Fake 2.5s latency emulates the external LLM call.

services:
  agent-python:
    command: ["sh", "-c", "uvicorn oryntra_agent.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-4}"]
    environment:
      UVICORN_WORKERS: 4
      AGENT_MAX_CONCURRENCY: 16
      AGENT_FAKE_LATENCY_MS: 2500
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  laravel-horizon:
    environment:
      HORIZON_AGENT_MAX: 20
      AGENT_MAX_CONCURRENCY_PER_ACCOUNT: 0
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
