server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Use Docker's embedded DNS and resolve the PHP upstream per-request via a
    # variable. Without this nginx caches the laravel-app IP at startup, so a
    # rebuild/recreate that reassigns container IPs causes 502s until nginx is
    # restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_upstream laravel-app:9000;

    root /var/www/html/laravel/public;
    index index.php index.html;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 32 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
