# =============================================================================
# Oryntra — exemplo de stack Docker Swarm (apenas o SISTEMA)
#
# Para quem só quer instalar: este stack sobe apenas a aplicação Oryntra a
# partir de imagens publicadas no Docker Hub. Postgres, Redis e o storage S3
# NÃO fazem parte daqui — você aponta para os seus (gerenciados ou próprios).
#
# Pré-requisitos:
#   - Docker Swarm inicializado:            docker swarm init
#   - Um Traefik já rodando no swarm, com uma rede overlay externa (TLS/roteamento)
#   - Postgres (com a extensão pgvector), Redis e um bucket S3 acessíveis
#
# Como subir:
#   1. Copie o .env de exemplo e preencha:
#        cp .env.stack.example .env && nano .env
#   2. Carregue as variáveis e faça o deploy (stack deploy NÃO lê .env sozinho):
#        set -a && . ./.env && set +a
#        docker stack deploy -c docker-stack.yml oryntra
#   3. Rode as migrations uma vez:
#        docker exec $(docker ps -qf name=oryntra_laravel-app) php artisan migrate --force
#
# Observação: Swarm IGNORA `build:`, `depends_on`, `container_name` e
# `restart:`. As imagens precisam estar prontas no registry, e o Traefik lê
# `deploy.labels` (não `labels`).
# =============================================================================

version: "3.9"

networks:
  # Rede interna do stack (overlay, criada pelo deploy).
  oryntra:
    driver: overlay
  # Rede do Traefik que já existe no swarm (criada fora deste stack).
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

services:
  # --- Front HTTP: nginx servindo os assets e passando PHP para o php-fpm ------
  nginx:
    image: andersonlemes/oryntra-nginx:${ORYNTRA_VERSION:-latest}
    networks:
      - oryntra
      - traefik
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 128M
      labels:
        - "traefik.enable=true"
        # Traefik v3 (provider swarm) usa traefik.swarm.network.
        # Em Traefik v2 (swarmMode) troque por traefik.docker.network.
        - "traefik.swarm.network=${TRAEFIK_NETWORK:-traefik}"
        - "traefik.http.routers.oryntra-app.rule=Host(`${APP_DOMAIN}`)"
        - "traefik.http.routers.oryntra-app.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
        - "traefik.http.routers.oryntra-app.tls=true"
        - "traefik.http.routers.oryntra-app.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
        - "traefik.http.services.oryntra-app.loadbalancer.server.port=80"

  # --- App Laravel (php-fpm) ---------------------------------------------------
  laravel-app:
    image: andersonlemes/oryntra-laravel:${ORYNTRA_VERSION:-latest}
    environment:
      APP_NAME: ${APP_NAME:-Oryntra}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: https://${APP_DOMAIN}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
      AGENT_PYTHON_URL: http://agent-python:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      REVERB_APP_ID: ${REVERB_APP_ID:-oryntra}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${APP_DOMAIN}
      REVERB_PORT: "443"
      REVERB_SCHEME: https
    networks:
      - oryntra
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 768M

  # --- Filas (Horizon) ---------------------------------------------------------
  laravel-horizon:
    image: andersonlemes/oryntra-laravel:${ORYNTRA_VERSION:-latest}
    command: ["php", "artisan", "horizon"]
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AGENT_PYTHON_URL: http://agent-python:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      HORIZON_AGENT_MAX: ${HORIZON_AGENT_MAX:-3}
      HORIZON_CHATWOOT_WEBHOOKS_MAX: ${HORIZON_CHATWOOT_WEBHOOKS_MAX:-2}
      HORIZON_BACKGROUND_MAX: ${HORIZON_BACKGROUND_MAX:-2}
      AGENT_MAX_CONCURRENCY_PER_ACCOUNT: ${AGENT_MAX_CONCURRENCY_PER_ACCOUNT:-5}
      AGENT_RUN_TIMEOUT: ${AGENT_RUN_TIMEOUT:-180}
    networks:
      - oryntra
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1024M

  # --- Scheduler ---------------------------------------------------------------
  laravel-scheduler:
    image: andersonlemes/oryntra-laravel:${ORYNTRA_VERSION:-latest}
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      QUEUE_CONNECTION: redis
    networks:
      - oryntra
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

  # --- Reverb (websocket, roteado pelo Traefik em APP_DOMAIN/app) --------------
  laravel-reverb:
    image: andersonlemes/oryntra-laravel:${ORYNTRA_VERSION:-latest}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8081"]
    environment:
      APP_KEY: ${APP_KEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REVERB_APP_ID: ${REVERB_APP_ID:-oryntra}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
    networks:
      - oryntra
      - traefik
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=${TRAEFIK_NETWORK:-traefik}"
        - "traefik.http.routers.oryntra-reverb.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/app`)"
        - "traefik.http.routers.oryntra-reverb.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
        - "traefik.http.routers.oryntra-reverb.tls=true"
        - "traefik.http.routers.oryntra-reverb.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
        - "traefik.http.routers.oryntra-reverb.priority=100"
        - "traefik.http.services.oryntra-reverb.loadbalancer.server.port=8081"

  # --- Runtime de IA (Python, privado) ----------------------------------------
  agent-python:
    image: andersonlemes/oryntra-agent-python:${ORYNTRA_VERSION:-latest}
    command: ["sh", "-c", "uvicorn oryntra_agent.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"]
    environment:
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      AGENT_RUNTIME_INTERNAL_TOKEN: ${INTERNAL_API_TOKEN}
      LARAVEL_INTERNAL_BASE_URL: http://nginx
      POSTGRES_URL: ${POSTGRES_URL}
      LANGGRAPH_CHECKPOINTER: postgres
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      AGENT_MAX_CONCURRENCY: ${AGENT_MAX_CONCURRENCY:-8}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - oryntra
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1024M
